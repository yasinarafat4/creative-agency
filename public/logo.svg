<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Linear Gradient blending Soft Mint and Dark Green -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ce1ac" /> <!-- Soft Mint Green -->
      <stop offset="100%" stop-color="#059669" /> <!-- Dark Emerald Green -->
    </linearGradient>
  </defs>

  <!-- Rounded Background using the gradient -->
  <rect width="512" height="512" rx="120" fill="url(#greenGradient)" />
  
  <!-- The Initial (Text color set to white) -->
  <text 
    x="50%" 
    y="54%" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="800" 
    font-size="340" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="middle"
  >
    C
  </text>
</svg>
